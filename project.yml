name: MarkFlow
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
packages:
  MarkdownPackage:
    path: .
targets:
  MarkFlowApp:
    type: application
    platform: macOS
    supportedDestinations: [macOS]
    sources:
      - path: Sources/MarkFlowApp
    dependencies:
      - package: MarkdownPackage
        product: MarkFlowEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vikrant.markflow
        PRODUCT_NAME: MarkFlow
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Xcode/MarkFlow-Info.plist
        CODE_SIGN_ENTITLEMENTS: Xcode/MarkFlowApp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Xcode/MarkFlowApp.entitlements
          ENABLE_APP_SANDBOX: YES
        Release:
          ENABLE_APP_SANDBOX: YES
    scheme:
      gatherCoverageData: true
      testTargets:
        - MarkFlowAppTests

  MarkFlowAppTests:
    type: bundle.unit-test
    platform: macOS
    supportedDestinations: [macOS]
    sources:
      - path: Tests/MarkFlowAppTests
    dependencies:
      - target: MarkFlowApp
